version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: authx-db-v1
    environment:
      POSTGRES_USER: authx
      POSTGRES_PASSWORD: authx_dev_pass
      POSTGRES_DB: authx_db
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authx -d authx_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: authx-backend-v1
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: authx
      DB_PASSWORD: authx_dev_pass
      DB_NAME: authx_db
      JWT_SECRET: insecure_secret_key_v1
      PORT: 3000
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: authx-frontend-v1
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
